about_content: | # this will include new lines to allow paragraphs
  I am a 3rd year undergrad student at the [International Institute of Information Technology-Hyderabad](https://www.iiit.ac.in/)(IIIT-H), 
  currently pursuing a Dual Degree towards a Bachelors in Computer Science and Masters by Research in Computational Linguistics. I have a keen interest in Natural Language Processing & 
  Machine Learning, and have worked on several research projects involving the same.
  
  As a part of my masters, I am presently pursuing my research at the [MT-NLP Lab](https://ltrc.iiit.ac.in/nlpmt/) 
  at the [Language Technology Research Centre](https://ltrc.iiit.ac.in/) (LTRC) at IIIT-H, with 
  [Dr. Manish Shrivastava](https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=&cad=rja&uact=8&ved=2ahUKEwju5c2Ug_TuAhWFgdgFHcxoAFcQFjAAegQIARAD&url=http%3A%2F%2Fscholar.google.co.in%2Fcitations%3Fuser%3DsIvMnGQAAAAJ%26hl%3Den&usg=AOvVaw2YHxW1do-XZ_ILcU1ZIXPe) as my research advisor.
  
  Apart from NLP, I have also come to develop an interest in Congnitive Sciences. Recently, more so in how Psycholinguistics can shed light upon how 
  our meta-cognitive beliefs may affect common behavioural decisions.

