        description: | # this will include new lines
          **Extracting Latent Lexical Hierarchy from Word Embeddings**: Using word embeddings such as Word2Vec, GloVe & FastText to predict pairwise word hierarchy, with an aim towards an automated graph-based lexical hierarchy database.

      - layout: left
